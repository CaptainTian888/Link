<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — Captain Link</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://imagehub.tianzeqi.dev/file/favicon/1766540939004_14.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

  <!-- 动画背景 -->
  <div class="animated-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ========== 密码门 ========== -->
  <div class="password-gate" id="passwordGate">
    <svg class="lock-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
    </svg>
    <h2>管理后台</h2>
    <p>请输入管理密码以继续</p>
    <div class="input-group">
      <input type="password" id="passwordInput" placeholder="输入密码..." autocomplete="off">
      <button class="toggle-visibility" onclick="togglePasswordVisibility()">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </button>
    </div>
    <p class="error-msg" id="passwordError">密码错误，请重试</p>
    <button class="btn btn-primary" onclick="checkPassword()">进入管理</button>
  </div>

  <!-- ========== 管理面板 ========== -->
  <div class="admin-panel" id="adminPanel" style="display:none;">

    <!-- 头部 -->
    <div class="admin-header">
      <h2>链接管理</h2>
      <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <!-- 部署状态 -->
    <div class="deploy-status" id="deployStatus"></div>

    <!-- 添加新链接表单 -->
    <div class="section-card">
      <h3>添加新链接</h3>
      <form id="linkForm" onsubmit="handleLinkSubmit(event)">
        <div class="form-row">
          <div class="form-field">
            <label>链接标题 *</label>
            <input type="text" id="linkTitle" placeholder="例如：GitHub" required autocomplete="off">
          </div>
          <div class="form-field">
            <label>链接 URL *</label>
            <input type="text" id="linkUrl" placeholder="例如：https://github.com" required autocomplete="off">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field full">
            <label>描述</label>
            <textarea id="linkDesc" placeholder="简要描述这个链接..."></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>分类标签</label>
            <input type="text" id="linkCat" placeholder="例如：开发工具" autocomplete="off">
          </div>
          <div class="form-field" style="justify-content:flex-end;">
            <button type="submit" class="btn btn-primary" style="width:auto;">添加链接</button>
          </div>
        </div>
      </form>
    </div>

    <!-- 现有链接列表 -->
    <div class="section-card">
      <h3>现有链接 <span class="count" id="linkCount"></span></h3>
      <div class="link-list" id="linkList">
        <!-- 由 admin.js 动态渲染 -->
      </div>
    </div>

    <!-- GitHub 部署设置 -->
    <div class="section-card">
      <h3>GitHub 部署设置</h3>
      <div class="github-settings">

        <!-- 仓库信息 -->
        <div class="setting-row">
          <span class="setting-label">仓库地址</span>
          <span class="setting-value" id="repoDisplay">—</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">分支</span>
          <span class="setting-value" id="branchDisplay">—</span>
        </div>

        <!-- Token 输入 -->
        <div class="form-field full" style="margin-top:8px;">
          <label>GitHub Personal Access Token</label>
          <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
        </div>

        <div class="setting-row">
          <span class="setting-label">Token 状态</span>
          <span class="token-status disconnected" id="tokenStatus">● 未连接</span>
        </div>

        <div style="display:flex;gap:12px;">
          <button class="btn btn-secondary" onclick="saveToken()" style="flex:1;">保存 Token</button>
          <button class="btn btn-secondary" onclick="clearToken()" style="flex:1;">清除 Token</button>
        </div>

        <p style="font-size:12px;color:var(--text-muted);line-height:1.6;margin-top:8px;">
          <strong>Token 获取方式：</strong>访问 GitHub → Settings → Developer settings →
          Personal access tokens → Generate new token (classic) → 勾选 <code>repo</code> 权限 → 生成并复制。
          <br>Token 仅存储在浏览器 sessionStorage 中，关闭浏览器后自动清除。
        </p>
      </div>
    </div>

    <!-- 保存部署按钮 -->
    <div class="deploy-bar">
      <button class="btn btn-primary" id="deployBtn" onclick="saveAndDeploy()">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        保存并自动部署
      </button>
    </div>

  </div>

  <!-- 编辑链接弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>编辑链接</h3>
        <button class="modal-close" onclick="closeEditModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>链接标题 *</label>
          <input type="text" id="editTitle" required autocomplete="off">
        </div>
        <div class="form-field">
          <label>链接 URL *</label>
          <input type="text" id="editUrl" required autocomplete="off">
        </div>
        <div class="form-field">
          <label>描述</label>
          <textarea id="editDesc" rows="2"></textarea>
        </div>
        <div class="form-field">
          <label>分类标签</label>
          <input type="text" id="editCat" autocomplete="off">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeEditModal()" style="flex:1;">取消</button>
        <button class="btn btn-primary" onclick="handleEditSubmit()" style="flex:1;">保存修改</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script>
    /* 显示仓库信息 */
    document.getElementById('repoDisplay').textContent =
      CONFIG.GITHUB_CONFIG.owner + '/' + CONFIG.GITHUB_CONFIG.repo;
    document.getElementById('branchDisplay').textContent =
      CONFIG.GITHUB_CONFIG.branch;
  </script>
  <script src="js/admin.js"></script>
</body>
</html>
