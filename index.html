<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captain Link</title>
  <link rel="icon" href="https://imagehub.tianzeqi.dev/file/favicon/1766540939004_14.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --bg: #f0f4ff;
      --surface: rgba(255,255,255,0.82);
      --surface-hover: rgba(255,255,255,0.96);
      --border: rgba(100,120,200,0.12);
      --border-hover: rgba(100,120,200,0.28);
      --primary: #3d5af1;
      --primary-light: #e8ecff;
      --accent: #00c9a7;
      --text: #1a1f36;
      --text-muted: #6b7280;
      --shadow: 0 4px 24px rgba(61,90,241,0.07);
      --shadow-hover: 0 12px 40px rgba(61,90,241,0.14);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: rgba(240,244,255,0.88);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-img { width: 32px; height: 32px; border-radius: 8px; }
    .logo-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    .header-badge {
      margin-left: auto;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 72px 24px 48px;
    }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.15;
      color: var(--text);
    }
    .hero h1 span { color: var(--primary); }
    .hero p {
      margin-top: 16px;
      font-size: 16px;
      color: var(--text-muted);
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.7;
    }
    .stats-row {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.4px; text-transform: uppercase; }

    /* ── Section ── */
    .section {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 24px 64px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 20px;
      padding-left: 4px;
    }

    /* ── Domain grid ── */
    .domain-group { margin-bottom: 56px; }
    .domain-group-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 18px;
      padding: 6px 16px 6px 10px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }
    .dot.accent { background: var(--accent); }

    /* ── Site card ── */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .site-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
    }
    .site-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .card-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .card-domain {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tag {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-light);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .card-tag.accent-tag { color: #059669; background: #d1fae5; }

    /* iframe preview */
    .iframe-wrap {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: #f8faff;
    }
    .iframe-wrap iframe {
      width: 160%;
      height: 160%;
      border: none;
      transform: scale(0.625);
      transform-origin: top left;
      pointer-events: none;
      display: block;
    }
    .iframe-overlay {
      position: absolute;
      inset: 0;
      cursor: pointer;
    }
    .iframe-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .iframe-placeholder svg { opacity: 0.35; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }
    .card-url {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-open {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--primary-light);
      transition: background 0.15s;
    }
    .card-open:hover { background: #d1d9ff; }

    /* ── Subdomain rows ── */
    .sub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .sub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .sub-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .sub-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sub-domain { font-size: 12px; font-weight: 600; color: var(--text); }
    .sub-note {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
    }
    .sub-iframe-wrap {
      position: relative;
      width: 100%;
      height: 150px;
      overflow: hidden;
      background: #f8faff;
    }
    .sub-iframe-wrap iframe {
      width: 160%;
      height: 160%;
      border: none;
      transform: scale(0.625);
      transform-origin: top left;
      pointer-events: none;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .sites-grid { grid-template-columns: 1fr; }
      .sub-grid { grid-template-columns: 1fr; }
      .stats-row { gap: 24px; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="header-inner">
    <img class="logo-img" src="https://imagehub.tianzeqi.dev/file/favicon/1766540939004_14.png" alt="logo" onerror="this.style.display='none'">
    <span class="logo-name">Captain Link</span>
    <span class="header-badge">Domain Dashboard</span>
  </div>
</header>

<div class="hero">
  <h1>All Sites at a<br><span>Glance</span></h1>
  <p>一站式预览旗下所有域名与子域名，快速访问每一个网站。</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num">24</div><div class="stat-label">主域名</div></div>
    <div class="stat"><div class="stat-num">53</div><div class="stat-label">子域名</div></div>
    <div class="stat"><div class="stat-num">10+</div><div class="stat-label">工具服务</div></div>
  </div>
</div>

<div class="section">

  <!-- ── 主域名展示 ── -->
  <div class="domain-group">
    <div class="domain-group-label"><span class="dot"></span>主域名一览</div>
    <div class="sites-grid" id="main-domains-grid"></div>
  </div>

  <!-- ── tianzeqi.dev 工具子站 ── -->
  <div class="domain-group">
    <div class="domain-group-label"><span class="dot accent"></span>tianzeqi.dev · 工具子站</div>
    <div class="sub-grid" id="tzq-subs-grid"></div>
  </div>

  <!-- ── zerohub.ai 子站 ── -->
  <div class="domain-group">
    <div class="domain-group-label"><span class="dot accent"></span>zerohub.ai · 产品子站</div>
    <div class="sub-grid" id="zh-subs-grid"></div>
  </div>

</div>

<footer>© 2024 Captain Link &nbsp;·&nbsp; Powered by Cloudflare</footer>

<script>
// ── Animated background ──
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, blobs;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initBlobs() {
    blobs = Array.from({length: 6}, (_, i) => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 200 + Math.random() * 300,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      hue: [220, 200, 240, 180, 260, 210][i]
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    blobs.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      if (b.x < -b.r) b.x = W + b.r;
      if (b.x > W + b.r) b.x = -b.r;
      if (b.y < -b.r) b.y = H + b.r;
      if (b.y > H + b.r) b.y = -b.r;
      const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      g.addColorStop(0, `hsla(${b.hue},80%,70%,0.13)`);
      g.addColorStop(1, `hsla(${b.hue},80%,70%,0)`);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); initBlobs(); draw();
})();

// ── Data ──
const mainDomains = [
  '20021128.xyz','akasolv.com','captain.bz','captain.ninja',
  'clipperbloc.com','lioncaptain.com','mabang.group','mabang.org',
  'ninja.bi','ninthclub.com','partnerrealm.com','shinevista.group',
  'stablechain.group','stablechain.trade','stablegold.cc',
  'tianzeqi.cc','tianzeqi.cn','tianzeqi.com','tianzeqi.link',
  'tianzeqi.net','tianzeqi.top','tianzeqi.xyz','wenlian.trade','zerohub.ai'
];

const tzqSubs = [
  { sub: 'currency.tianzeqi.dev', note: '货币转换器' },
  { sub: 'extractor.tianzeqi.dev', note: '网页提取器' },
  { sub: 'favicon.tianzeqi.dev', note: 'Favicon抓取' },
  { sub: 'film.tianzeqi.dev', note: '视频' },
  { sub: 'html.tianzeqi.dev', note: '代码预览' },
  { sub: 'imagehub.tianzeqi.dev', note: '图床' },
  { sub: 'json.tianzeqi.dev', note: 'JSON工具' },
  { sub: 'net.tianzeqi.dev', note: '网络工具' },
  { sub: 'time.tianzeqi.dev', note: '时间仪表板' },
  { sub: 'blog.tianzeqi.dev', note: '博客' },
];

const zhSubs = [
  { sub: 'amz.zerohub.ai', note: 'Amazon相关' },
  { sub: 'vedio.zerohub.ai', note: '视频' },
  { sub: 'api.zerohub.ai', note: 'API接口' },
];

// ── Helpers ──
function getFavicon(domain) {
  return `https://www.google.com/s2/favicons?sz=32&domain=${domain}`;
}

function makeIframe(url, wrapClass, iframeClass) {
  const protocol = 'https';
  const fullUrl = `${protocol}://${url}`;
  return `
    <div class="${wrapClass}">
      <iframe src="${fullUrl}" loading="lazy" sandbox="allow-scripts allow-same-origin" title="${url}"></iframe>
      <div class="iframe-overlay" onclick="window.open('${fullUrl}','_blank')"></div>
    </div>`;
}

// ── Render main domains ──
const mainGrid = document.getElementById('main-domains-grid');
mainDomains.forEach(domain => {
  const url = `https://${domain}`;
  const el = document.createElement('div');
  el.className = 'site-card';
  el.innerHTML = `
    <div class="card-header">
      <img class="card-favicon" src="${getFavicon(domain)}" alt="" onerror="this.src='https://imagehub.tianzeqi.dev/file/favicon/1766540939004_14.png'">
      <span class="card-domain">${domain}</span>
    </div>
    <div class="iframe-wrap">
      <iframe src="${url}" loading="lazy" sandbox="allow-scripts allow-same-origin" title="${domain}"></iframe>
      <div class="iframe-overlay" onclick="window.open('${url}','_blank')"></div>
    </div>
    <div class="card-footer">
      <span class="card-url">${url}</span>
      <a class="card-open" href="${url}" target="_blank" rel="noopener">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 9.5L9.5 2.5M9.5 2.5H5.5M9.5 2.5V6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        访问
      </a>
    </div>`;
  mainGrid.appendChild(el);
});

// ── Render tzq subs ──
function renderSubGrid(containerId, items) {
  const grid = document.getElementById(containerId);
  items.forEach(({sub, note}) => {
    const url = `https://${sub}`;
    const el = document.createElement('div');
    el.className = 'sub-card';
    el.innerHTML = `
      <div class="sub-header">
        <img class="card-favicon" src="${getFavicon(sub)}" alt="" onerror="this.src='https://imagehub.tianzeqi.dev/file/favicon/1766540939004_14.png'">
        <span class="sub-domain">${sub}</span>
        ${note ? `<span class="sub-note">${note}</span>` : ''}
      </div>
      <div class="sub-iframe-wrap">
        <iframe src="${url}" loading="lazy" sandbox="allow-scripts allow-same-origin" title="${sub}"></iframe>
        <div class="iframe-overlay" onclick="window.open('${url}','_blank')"></div>
      </div>
      <div class="card-footer">
        <span class="card-url">${url}</span>
        <a class="card-open" href="${url}" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 9.5L9.5 2.5M9.5 2.5H5.5M9.5 2.5V6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          访问
        </a>
      </div>`;
    grid.appendChild(el);
  });
}

renderSubGrid('tzq-subs-grid', tzqSubs);
renderSubGrid('zh-subs-grid', zhSubs);
</script>
</body>
</html>
